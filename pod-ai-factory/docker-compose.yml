version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: pod_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: pod
      POSTGRES_PASSWORD: pod_secret
      POSTGRES_DB: pod_factory
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U pod -d pod_factory']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pod_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  redis_data:
